name: Deploy web to GitHub Pages

# Builds the Flutter web app and publishes it to GitHub Pages.
#
# One-time setup in the repo:
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"
#
# The app is served at:  https://<owner>.github.io/<repo>/
# (so the build uses --base-href "/<repo>/" — see the build step below).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the official Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pinned to the version the app was built and tested with.
          # Swap for `channel: stable` to always use the latest stable.
          flutter-version: 3.38.4
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Project pages are served from /<repo>/, so assets must resolve there.
      # The API host is baked in from lib/services/api_service.dart; override it
      # here with --dart-define=HAVEN_API_BASE=... if you ever need to.
      - name: Build web
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      # The app is a single page, but copying index.html to 404.html means any
      # deep link or refresh still serves it instead of a GitHub 404.
      - name: SPA fallback
        run: cp build/web/index.html build/web/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
